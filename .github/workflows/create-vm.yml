name: Try to Create OCI VM

on:
  workflow_dispatch:

env:
  COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
  IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
  SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
  OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}

jobs:
  snipe:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ad:
          - { name: "pGdO:PHX-AD-1", label: "AD-1" }
          - { name: "pGdO:PHX-AD-2", label: "AD-2" }
          - { name: "pGdO:PHX-AD-3", label: "AD-3" }
    steps:
      - uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-pip-oci-cli-v1

      - run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup OCI CLI
        run: |
          pip install oci-cli
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf "[DEFAULT]\nuser=%s\ntenancy=%s\nfingerprint=%s\nkey_file=~/.oci/oci_api_key.pem\nregion=%s\n" \
            "${{ secrets.OCI_CLI_USER }}" "${{ secrets.OCI_CLI_TENANCY }}" "${{ secrets.OCI_CLI_FINGERPRINT }}" "${{ env.OCI_CLI_REGION }}" > ~/.oci/config
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /home/runner/my_ssh_key.pub

      - name: Snipe ${{ matrix.ad.label }}
        timeout-minutes: 360
        run: |
          AD_NAME="${{ matrix.ad.name }}"
          AD_LABEL="${{ matrix.ad.label }}"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=🚀 $AD_LABEL started sniping!"
          
          for i in $(seq 1 340); do
            echo "[$AD_LABEL] === Attempt $i/340 ==="
            OCI_OUTPUT=$(oci compute instance launch \
              --compartment-id "$COMPARTMENT_ID" \
              --availability-domain "$AD_NAME" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config '{"ocpus":4,"memoryInGBs":24}' \
              --subnet-id "$SUBNET_ID" \
              --image-id "$IMAGE_ID" \
              --ssh-authorized-keys-file "/home/runner/my_ssh_key.pub" \
              --assign-public-ip true \
              --display-name "coolify-vm" \
              --boot-volume-size-in-gbs 200 2>&1 || true)

            if echo "$OCI_OUTPUT" | grep -q '"lifecycle-state": "PROVISIONING"'; then
              echo "🎉 SUCCESS on $AD_LABEL!"
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
                --data-urlencode "text=🎉 SUCCESS! OCI VM created on $AD_LABEL! 4C24G ARM is ready!"
              exit 0
            fi

            echo "[$AD_LABEL] Attempt $i failed."

            if [ $((i % 10)) -eq 0 ]; then
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
                --data-urlencode "text=🔵 $AD_LABEL alive ($i/340)"
            fi

            if [ $i -lt 350 ]; then
              sleep 60
            fi
          done

          echo "[$AD_LABEL] All 350 attempts failed."

      - name: Auto-trigger Next Round
        if: always()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=🔴 ${{ matrix.ad.label }} round ended, auto-triggering..."
          curl -s -X POST "https://api.github.com/repos/snoopy996/oci-free-arm-instance/actions/workflows/create-vm.yml/dispatches" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -d '{"ref":"main"}'
