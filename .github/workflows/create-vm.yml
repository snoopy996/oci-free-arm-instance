name: Try to Create OCI VM

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
  IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
  SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
  AD_NAME: ${{ secrets.OCI_AD_NAME }}
  OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Cache pip packages
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: ${{ runner.os }}-pip-oci-cli-v1

      - name: Add OCI CLI to path
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup OCI CLI
        run: |
          pip install oci-cli
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_CLI_USER }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_CLI_TENANCY }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "region=${{ env.OCI_CLI_REGION }}" >> ~/.oci/config
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /home/runner/my_ssh_key.pub

      - name: Retry VM Creation (every 1 min, up to 350 attempts)
        timeout-minutes: 360
        run: |
          for i in $(seq 1 350); do
            echo "=== Attempt $i/350 ==="
            OCI_OUTPUT=$(oci compute instance launch \
              --compartment-id "$COMPARTMENT_ID" \
              --availability-domain "$AD_NAME" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config '{"ocpus":4,"memoryInGBs":24}' \
              --subnet-id "$SUBNET_ID" \
              --image-id "$IMAGE_ID" \
              --ssh-authorized-keys-file "/home/runner/my_ssh_key.pub" \
              --assign-public-ip true \
              --display-name "coolify-vm" \
              --boot-volume-size-in-gbs 200 2>&1 || true)

            if echo "$OCI_OUTPUT" | grep -q '"lifecycle-state": "PROVISIONING"'; then
              echo "SUCCESS! VM Created!"
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
                --data-urlencode "text=SUCCESS - OCI VM created! 4C24G ARM VM is ready!"
              exit 0
            fi

            echo "Attempt $i failed. Retrying in 1 min..."

            if [ $((i % 5)) -eq 0 ]; then
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
                --data-urlencode "text=alive - still trying ($i/350 attempts done)"
            fi

            if [ $i -lt 350 ]; then
              sleep 60
            fi
          done

          echo "All 350 attempts failed."

      - name: Auto-trigger Next Round
        if: always()
        run: |
          curl -s -X POST "https://api.github.com/repos/snoopy996/oci-free-arm-instance/actions/workflows/create-vm.yml/dispatches" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -d '{"ref":"main"}'
