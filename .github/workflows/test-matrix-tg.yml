name: Test Matrix Telegram
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ad: [{label: "A"}, {label: "B"}]
    steps:
      - name: Send
        run: |
          echo "Testing ${{ matrix.ad.label }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=🧪 Matrix test: job ${{ matrix.ad.label }}" 2>&1
